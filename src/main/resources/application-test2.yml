server:
  port: 7775

stub:
  delay-seconds: 4

spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    url: jdbc:h2:file:./data/testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  file:
    name: logs/stub.log
    max-size: 50MB
  pattern:
    console: "%d{HH:mm:ss.SSS} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger - %msg%n"
  level:
    org.springframework.boot.autoconfigure.h2: DEBUG
authorName: "test2"